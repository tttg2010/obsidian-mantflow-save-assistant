name: Upload manifest.json to Release
on:
  workflow_dispatch:
jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload manifest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload 0.1.0 manifest.json --clobber
